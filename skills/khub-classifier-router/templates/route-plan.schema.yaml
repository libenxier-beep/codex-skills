$schema: https://json-schema.org/draft/2020-12/schema
title: KHub Route Plan
type: object
additionalProperties: true
required:
  - kind
  - intake_id
  - source
  - source_id
  - timestamp
  - normalized_title
  - final_type
  - target_area
  - target_bucket
  - template_id
  - operation
  - target_note_title
  - target_note_path
  - confidence
  - review_needed
  - write_blocked
properties:
  kind:
    const: route-plan
  intake_id:
    type: string
    minLength: 1
  source:
    type: string
    minLength: 1
  source_id:
    type: string
    minLength: 1
  timestamp:
    type: string
    minLength: 1
  normalized_title:
    type: string
    minLength: 1
  final_type:
    type: string
    enum: [seed, cognition, concept, viewpoint, playbook, prediction]
  target_area:
    type: string
    minLength: 1
  target_bucket:
    type: string
    minLength: 1
  template_id:
    type: string
    minLength: 1
  operation:
    type: string
    enum: [create, append, split_new_note]
  target_note_title:
    type: string
    minLength: 1
  target_note_path:
    type: string
    pattern: \.md$
  confidence:
    type: number
    minimum: 0
    maximum: 1
  related_candidates:
    type: array
  dedupe_basis:
    type: array
    items:
      type: string
  review_needed:
    type: boolean
  write_blocked:
    const: false
